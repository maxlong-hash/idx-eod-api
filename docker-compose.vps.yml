services:
  app:
    build: .
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      MCP_TRANSPORT: http
      PUBLIC_BASE_URL: https://${DOMAIN}
      API_KEY: ${API_KEY:-}
      EOD_API_KEY: ${EOD_API_KEY:-}
      SCREENER_API_KEY: ${SCREENER_API_KEY:-}
      BROKSUM_DATA_DIR: /app/Scrape stockbit/2023
    expose:
      - "3000"
    volumes:
      - "./Scrape stockbit/2023:/app/Scrape stockbit/2023:ro"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
